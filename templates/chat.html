</div>

<script>

const TOKEN_KEY = "engineering_copilot_jwt";

function getToken() {
    return sessionStorage.getItem(TOKEN_KEY);
}

function setToken(token) {
    sessionStorage.setItem(TOKEN_KEY, token);
}

function showLogin(show) {
    $("#loginOverlay").toggleClass("d-none", !show);
    $("#messageArea :input").prop("disabled", show);
    $("#send").prop("disabled", show);
}

function requireAuth() {
    if (!getToken()) {
        showLogin(true);
        return false;
    }
    showLogin(false);
    return true;
}

$(document).ready(function() {

    requireAuth();

    $("#loginForm").on("submit", function(event) {
        event.preventDefault();
        $("#loginError").addClass("d-none");

        $.ajax({
            url: "/login",
            type: "POST",
            contentType: "application/json",
            data: JSON.stringify({
                username: $("#loginUsername").val(),
                password: $("#loginPassword").val(),
            }),
        }).done(function(data) {
            setToken(data.access_token);
            $("#loginUsername").val("");
            $("#loginPassword").val("");
            requireAuth();
        }).fail(function(xhr) {
            const msg = xhr.responseJSON && xhr.responseJSON.msg
                ? xhr.responseJSON.msg
                : "Login failed";
            $("#loginError").text(msg).removeClass("d-none");
        });
    });

    $("#messageArea").on("submit", function(event) {

        const date = new Date();

        const hour = date.getHours();

        const minute = date.getMinutes();

        const str_time = hour + ":" + minute;

        var rawText = $("#text").val();

        var userHtml =
            '<div class="d-flex justify-content-end mb-4">' +
                '<div class="msg_cotainer_send">' +
                    rawText +
                    '<span class="msg_time_send">' +
                        str_time +
                    '</span>' +
                '</div>' +
                '<div class="img_cont_msg">' +
                    '<img src="https://i.ibb.co/d5b84Xw/Untitled-design.png" class="rounded-circle user_img_msg">' +
                '</div>' +
            '</div>';

        $("#text").val("");

        $("#messageFormeight").append(userHtml);

        if (!requireAuth()) {
            event.preventDefault();
            return;
        }

        $.ajax({

            data: {
                msg: rawText,
            },

            type: "POST",

            url: "/get",

            headers: {
                Authorization: "Bearer " + getToken(),
            },

        }).done(function(data) {

            var botHtml =
			'<div class="d-flex justify-content-start mb-4">' +
				'<div class="img_cont_msg">' +
					'<img src="/static/avatar.png" class="copilot_msg_logo">' +
				'</div>' +
				'<div class="msg_cotainer">' +
					data +
					'<span class="msg_time">' +
						str_time +
					'</span>' +
				'</div>' +
			'</div>';

            $("#messageFormeight").append($.parseHTML(botHtml));

        }).fail(function(xhr) {
            if (xhr.status === 401) {
                sessionStorage.removeItem(TOKEN_KEY);
                requireAuth();
            }
        });

        event.preventDefault();

    });

});

</script>
